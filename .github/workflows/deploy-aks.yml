name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  AKS_NAMESPACE: ${{ vars.AKS_NAMESPACE || 'trading' }}
  RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME || 'trader' }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ibkr-adapter
          - risk-monitor
          - risk-gateway
          - api
          - strategy-hello
          - strategy-nvidia
          - dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE="${ACR_LOGIN_SERVER}/ibkrtrader/${{ matrix.service }}:${IMAGE_TAG}"
          docker build \
            -f "services/${{ matrix.service }}/Dockerfile" \
            -t "${IMAGE}" \
            "services/${{ matrix.service }}"
          docker push "${IMAGE}"

  deploy:
    name: Helm deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.APP_CLIENT_ID || secrets.CLIENTID }}
      AZURE_CLIENT_SECRET: ${{ secrets.CLIENTSECRET }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTIONID }}
      AZURE_TENANT_ID: ${{ secrets.TENANTID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure configuration
        shell: bash
        run: |
          missing=0

          if [ -z "${AZURE_CREDENTIALS}" ]; then
            for name in AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_SUBSCRIPTION_ID AZURE_TENANT_ID; do
              if [ -z "${!name}" ]; then
                echo "::error::Missing Azure secret ${name}. Set AZURE_CREDENTIALS, or set APP_CLIENT_ID/CLIENTID, CLIENTSECRET, SUBSCRIPTIONID and TENANTID."
                missing=1
              fi
            done
          fi

          for name in AZURE_RESOURCE_GROUP AKS_CLUSTER_NAME ACR_LOGIN_SERVER; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions variable or secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Log in to Azure with AZURE_CREDENTIALS
        if: env.AZURE_CREDENTIALS != ''
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Log in to Azure with client secret fields
        if: env.AZURE_CREDENTIALS == ''
        uses: azure/login@v3
        with:
          creds: >-
            {"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}

      - name: Set AKS context
        id: aks-context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Verify Kubernetes context
        shell: bash
        run: |
          kubectl config current-context
          kubectl cluster-info

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install CloudNativePG operator
        shell: bash
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --set crds.create=true
          kubectl wait --for=condition=Established crd/clusters.postgresql.cnpg.io --timeout=300s
          kubectl wait --namespace cnpg-system \
            --for=condition=Available deployment/cnpg-cloudnative-pg \
            --timeout=300s

      - name: Generate image override values
        shell: bash
        run: |
          cat > /tmp/image-overrides.yaml <<EOF
          ibkrAdapter:
            image:
              repository: ${ACR_LOGIN_SERVER}/ibkrtrader/ibkr-adapter
              tag: ${IMAGE_TAG}
          riskGateway:
            image:
              repository: ${ACR_LOGIN_SERVER}/ibkrtrader/risk-gateway
              tag: ${IMAGE_TAG}
          riskMonitor:
            image:
              repository: ${ACR_LOGIN_SERVER}/ibkrtrader/risk-monitor
              tag: ${IMAGE_TAG}
          api:
            image:
              repository: ${ACR_LOGIN_SERVER}/ibkrtrader/api
              tag: ${IMAGE_TAG}
          dashboard:
            image:
              repository: ${ACR_LOGIN_SERVER}/ibkrtrader/dashboard
              tag: ${IMAGE_TAG}
          strategies:
            - name: hello
              clientId: 11
              image:
                repository: ${ACR_LOGIN_SERVER}/ibkrtrader/strategy-hello
                tag: ${IMAGE_TAG}
            - name: nvidia
              clientId: 12
              image:
                repository: ${ACR_LOGIN_SERVER}/ibkrtrader/strategy-nvidia
                tag: ${IMAGE_TAG}
          EOF

      - name: Deploy with Helm
        run: |
          helm dependency update ./helm/ibkrtrader
          helm upgrade --install "${RELEASE_NAME}" ./helm/ibkrtrader \
            --namespace "${AKS_NAMESPACE}" \
            --create-namespace \
            -f ./helm/ibkrtrader/values.paper.yaml \
            -f ./helm/ibkrtrader/values.azure.yaml \
            -f /tmp/image-overrides.yaml

      - name: Verify rollout
        shell: bash
        run: |
          kubectl -n "${AKS_NAMESPACE}" get pods
          kubectl -n "${AKS_NAMESPACE}" rollout status deployment/${RELEASE_NAME}-ibkrtrader-api --timeout=10m
          kubectl -n "${AKS_NAMESPACE}" rollout status deployment/${RELEASE_NAME}-ibkrtrader-dashboard --timeout=10m
          kubectl -n "${AKS_NAMESPACE}" rollout status statefulset/${RELEASE_NAME}-ibkrtrader-ibgw-paper --timeout=5m || echo "::warning::IB Gateway is still starting or waiting for manual IB auth/2FA. Use VNC or inspect gateway logs."
          kubectl -n "${AKS_NAMESPACE}" rollout status deployment/${RELEASE_NAME}-ibkrtrader-ibkr-adapter --timeout=5m || echo "::warning::IBKR adapter is not ready yet because it waits for both NATS and IB Gateway."
          kubectl -n "${AKS_NAMESPACE}" rollout status deployment/${RELEASE_NAME}-ibkrtrader-risk-monitor --timeout=5m || echo "::warning::Risk monitor is not ready yet; inspect pod logs once NATS and the adapter are online."

      - name: Post-deploy guidance
        shell: bash
        run: |
          echo "Dashboard port-forward: kubectl -n ${AKS_NAMESPACE} port-forward svc/${RELEASE_NAME}-ibkrtrader-dashboard 3000:3000"
          echo "Gateway VNC port-forward: kubectl -n ${AKS_NAMESPACE} port-forward sts/${RELEASE_NAME}-ibkrtrader-ibgw-paper 5900:5900"
          echo "Gateway logs: kubectl -n ${AKS_NAMESPACE} logs sts/${RELEASE_NAME}-ibkrtrader-ibgw-paper -f"

      - name: Dump diagnostics on failure
        if: failure() && steps.aks-context.outcome == 'success'
        shell: bash
        run: |
          kubectl -n "${AKS_NAMESPACE}" get pods -o wide
          kubectl -n "${AKS_NAMESPACE}" get events --sort-by=.metadata.creationTimestamp | tail -n 200
          kubectl -n "${AKS_NAMESPACE}" describe pod ${RELEASE_NAME}-ibkrtrader-ibgw-paper-0 || true
          kubectl -n "${AKS_NAMESPACE}" describe deployment ${RELEASE_NAME}-ibkrtrader-ibkr-adapter || true
          kubectl -n "${AKS_NAMESPACE}" logs deploy/${RELEASE_NAME}-ibkrtrader-ibkr-adapter --tail=200 || true

      - name: Explain missing AKS context
        if: failure() && steps.aks-context.outcome != 'success'
        shell: bash
        run: |
          echo "::error::AKS context was not configured, so kubectl diagnostics were skipped. Check Azure login, AZURE_RESOURCE_GROUP, AKS_CLUSTER_NAME and service principal access to the AKS cluster."
