# ibkrtrader default values.
#
# Chartet deployer hele topologien (gateway, adapter, risk plane, API, dashboard,
# NATS, strategier) i én release så wiring kan verificeres ende til ende.
# Overlay værdier ligger i values.paper.yaml, values.live.yaml og values.azure.yaml.

global:
  # Default registry er Azure Container Registry. CI workflowet overstyrer
  # alligevel pr service image.repository, så denne værdi rammer kun ved
  # manuel helm upgrade uden image-overrides.yaml.
  imageRegistry: tradeops.azurecr.io
  # AKS pull fra attached ACR går via kubelet managed identity, så ingen
  # imagePullSecret kræves.
  imagePullSecrets: []
  storageClass: ""

# IBKR Gateway: TWS forbindelsen mod Interactive Brokers.
ibkr:
  # mode passes som IBKR_MODE env var til alle services og indgår i
  # activeGatewayHost helper'en, så strategier rammer paper eller live socket.
  # Begge gateways kan køre samtidigt ved at sætte begge enabled=true.
  mode: paper          # paper | live
  account: "DUQ568769"  # IBKR konto ID

  # Per mode gateway konfiguration. Deaktiver én for at spare ressourcer.
  gateways:
    paper:
      enabled: true
      image:
        repository: ghcr.io/gnzsnz/ib-gateway
        tag: stable
        pullPolicy: IfNotPresent
      apiPort: 4004
      vncPort: 5900
      # IBC auto restart tidspunkt (Toronto). Gatewayen genstarter inden for
      # det eksisterende session vindue så daglig 2FA ikke promptes igen.
      # Den ugentlige Sunday 01:00 ET reset kræver stadig et manuelt tap.
      autoRestartTime: "11:55 PM"
      twoFaTimeoutAction: restart
      readOnlyApi: false
      trustedIPs: "10.0.0.0/8"   # pod CIDR, sæt til "" for kun at tillade localhost
      resources:
        requests: { cpu: 250m, memory: 512Mi }
        limits:   { cpu: "2",  memory: 2Gi }
      persistence:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      nodeSelector: {}
      tolerations: []
      affinity: {}

    live:
      enabled: false
      image:
        repository: ghcr.io/gnzsnz/ib-gateway
        tag: stable
        pullPolicy: IfNotPresent
      apiPort: 4003
      vncPort: 5900
      autoRestartTime: "11:55 PM"
      twoFaTimeoutAction: restart
      readOnlyApi: false
      resources:
        requests: { cpu: 500m, memory: 1500Mi }
        limits:   { cpu: "2",  memory: 3Gi }
      persistence:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      nodeSelector: {}
      tolerations: []
      affinity: {}

  # TWS login credentials. CI injicerer username/password fra GitHub Actions
  # secrets (IBKR_USERNAME, IBKR_PASSWORD) via en tmp values fil, så chartet
  # selv renderer Secret'en. Lokal helm install kræver overstyring.
  credentials:
    # Sæt existingSecret hvis du i stedet vil bruge en pre eksisterende Secret
    # (forventede nøgler: TWS_USERID, TWS_PASSWORD). Når den er tom opretter
    # chartet selv en Secret fra username/password nedenfor.
    existingSecret: ""
    username: ""
    password: ""

# Strategier: én Deployment + headless Service pr aktiveret entry.
# clientId skal være unikt på tværs af alle aktiverede strategier;
# _helpers.tpl validerer dette ved template render og fejler installationen
# ved kollisioner. clientId=1 er reserveret til ibkr-adapter (sæt den ikke her).
strategies:
  - name: hello
    enabled: true
    image:
      repository: tradeops.azurecr.io/ibkrtrader/strategy-hello
      # Default tag = senest deployede git SHA. CI overstyrer pr deploy.
      tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
      pullPolicy: IfNotPresent
    clientId: 11
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    # Pr strategi pre trade grænser, sendes til risk-gateway via STRATEGY_LIMITS_JSON.
    risk:
      maxOrderNotional: 1000
      maxPosition: 10
      maxDailyLoss: -100000
      maxOrdersPerSecond: 1

  - name: nvidia
    enabled: true
    image:
      repository: tradeops.azurecr.io/ibkrtrader/strategy-nvidia
      tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
      pullPolicy: IfNotPresent
    clientId: 12
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    risk:
      maxOrderNotional: 5000
      maxPosition: 38
      maxDailyLoss: -10000
      maxOrdersPerSecond: 1

# IBKR Adapter: ejer den eneste TWS forbindelse (clientId=1 reserveret).
# Bro mellem IBKR og NATS:
#   orders.>        (NATS indkommende) -> TWS placeOrder()
#   fills/pnl/pos   (TWS callbacks)    -> NATS udgående
#   risk.adapter.*  heartbeat + disconnection alarmer
ibkrAdapter:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/ibkr-adapter
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  # clientId=1 er reserveret til adapteren. Brug IKKE 1 i .strategies[].
  clientId: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  reconnectIntervalS: 10
  logLevel: INFO
  logFormat: json      # json | console
  # Kommasepareret liste af tickers at streame realtime markedsdata for.
  # Adapteren kalder IBKR reqMktData pr symbol og publicerer ticks til
  # marketdata.realtime.<SYMBOL>. Skal dække alle symboler i et hvilket som
  # helst aktiveret strategi univers; ellers modtager strategien ingen bars.
  universe: "NVDA,AAPL"
  nodeSelector: {}
  tolerations: []

# Risk plane: pre trade gateway (synkron HTTP) + post trade monitor (NATS subscriber).
riskGateway:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/risk-gateway
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

  # Konto dækkende pre trade grænser. Håndhæves i tillæg til pr strategi grænser.
  global:
    maxAccountDrawdownPct: 0.05
    maxGrossExposure: 1000000
    maxOrdersPerSecond: 50
    restrictedSymbols: []

riskMonitor:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/risk-monitor
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2          # leader elected via Lease, kun leder handler
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Hvor ofte monitoren tjekker drift / breach mod thresholds.
  reconcileIntervalSeconds: 10
  # Tillader monitoren at scalere strategi Deployments til 0 ved breach.
  # Slået fra som default; tændes typisk kun i live (values.live.yaml).
  killSwitchEnabled: false









  # Risikogrænser, sendes til monitoren som env vars.
  thresholds:
    maxDailyLoss: 1800
    maxDrawdownPct: 0.5         # halt ved 50% intra day drawdown fra HWM
    maxGrossExposure: 1000000   # halt hvis gross eksponering overstiger dette (USD)
    heartbeatTimeoutS: 60       # alarm hvis adapteren er tavs 60s







  # Telegram alarmer ved breach / kill switch trigger.
  # CI injicerer token + chatId fra GitHub secrets via tmp values fil.
  # Sæt existingSecret hvis du selv vil levere en pre eksisterende Secret.
  telegram:
    enabled: true
    existingSecret: ""
    token: ""
    chatId: ""

# Read only HTTP API + Next.js dashboard.
# API'en eksponerer positions, PnL og adapter heartbeat (cached fra NATS).
# Dashboarden proxyer alle /api/trader/* kald videre til API service.
api:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/api
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

dashboard:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/dashboard
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Ingress er som default slået fra; aktiveres af values.azure.yaml til AKS.
  ingress:
    enabled: false
    className: ""
    host: trader.example.com
    annotations: {}
    tls: []

# NATS broker (subchart) + JetStream stream bootstrap Job.
# JetStream er aktiveret med file storage; cluster mode er fra for at spare
# ressourcer (kan bumpes til 3 node ved behov for HA).
nats:
  enabled: true
  config:
    cluster:
      enabled: false                   # bump til 3 node cluster for HA
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 10Gi

# Engangs Job der opretter ORDERS, FILLS, MARKETDATA og RISK streams
# efter helm install/upgrade. Idempotent.
jetstreamStreams:
  bootstrapJob:
    enabled: true
    image: natsio/nats-box:0.16.0

# RBAC: kun risk-monitor har faktisk brug for det (scaler strategier ned ved
# kill switch + leader election Lease). Andre pods bruger den fælles
# serviceAccount uden ekstra rettigheder.
rbac:
  create: true

serviceAccount:
  create: true
  name: ""                             # genereres fra chart navn hvis tomt
