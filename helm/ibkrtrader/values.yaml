# ============================================================================
#
# ibkrtrader, default værdier
#
# Dette er v0 overfladen. De fleste komponenter refererer placeholder images
# (registry.local/ibkrtrader/...) som du selv bygger. Chartet er
# designet til at deploye en komplet topologi selv med placeholders så wiring
# kan verificeres ende til ende.
# ============================================================================

global:
  # Default registry er Azure Container Registry. CI workflowet overstyrer
  # alligevel pr service image.repository, så denne værdi rammer kun ved
  # manuel helm upgrade uden image-overrides.yaml.
  imageRegistry: tradeops.azurecr.io
  # AKS pull fra attached ACR går via kubelet managed identity,
  # så ingen imagePullSecret kræves.
  imagePullSecrets: []
  storageClass: ""

# ----------------------------------------------------------------------------
# IBKR Gateway
# ----------------------------------------------------------------------------
ibkr:
  # mode vælger hvilken gateway StatefulSet strategier peger på.
  # Begge StatefulSets kan deployes samtidigt ved at aktivere begge
  # gateways nedenfor; dette flag styrer kun default DNS resolution.
  mode: paper          # paper | live
  account: "DUQ568769"  # IBKR konto ID

  # Per mode gateway konfiguration. Deaktiver én for at spare ressourcer.
  gateways:
    paper:
      enabled: true
      image:
        repository: ghcr.io/gnzsnz/ib-gateway
        tag: stable
        pullPolicy: IfNotPresent
      apiPort: 4004
      vncPort: 5900
      # IBC auto restart tidspunkt (Toronto), gatewayen genstarter inden for
      # det eksisterende session vindue så daglig 2FA ikke promptes igen. Den
      # ugentlige Sunday 01:00 ET reset kræver stadig et manuelt tap.
      autoRestartTime: "11:55 PM"
      twoFaTimeoutAction: restart
      readOnlyApi: false
      trustedIPs: "10.0.0.0/8"   # pod CIDR, sæt til "" for kun at tillade localhost
      resources:
        requests: { cpu: 250m, memory: 512Mi }
        limits:   { cpu: "2",  memory: 2Gi }
      persistence:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      nodeSelector: {}
      tolerations: []
      affinity: {}

    live:
      enabled: false
      image:
        repository: ghcr.io/gnzsnz/ib-gateway
        tag: stable
        pullPolicy: IfNotPresent
      apiPort: 4003
      vncPort: 5900
      autoRestartTime: "11:55 PM"
      twoFaTimeoutAction: restart
      readOnlyApi: false
      resources:
        requests: { cpu: 500m, memory: 1500Mi }
        limits:   { cpu: "2",  memory: 3Gi }
      persistence:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      nodeSelector: {}
      tolerations: []
      affinity: {}

  # Credentials. CI injicerer username/password fra GitHub Actions secrets
  # (IBKR_USERNAME, IBKR_PASSWORD) via en tmp values fil, så chartet selv
  # rendrer Secret'en. Lokal helm install kræver overstyring af felterne.
  credentials:
    # Sæt existingSecret hvis du i stedet vil bruge en pre eksisterende Secret
    # (forventede nøgler: TWS_USERID, TWS_PASSWORD). Når den er tom opretter
    # chartet selv en Secret fra username/password nedenfor.
    existingSecret: ""
    username: ""
    password: ""

# ----------------------------------------------------------------------------
# Strategier
#
# Hver entry producerer:
#   én Deployment (image, resources, env, configmap mount)
#   én Service (til health probes)
#   én ConfigMap (strategi specifik config renderet som YAML)
#
# clientId SKAL være unikt på tværs af alle strategier, _helpers.tpl validerer dette
# på template render tidspunkt og fejler installationen ved kollisioner.
# ----------------------------------------------------------------------------
strategies:
  - name: hello
    enabled: true
    image:
      repository: tradeops.azurecr.io/ibkrtrader/strategy-hello
      # Default tag = senest deployede git SHA. CI overstyrer pr deploy.
      tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
      pullPolicy: IfNotPresent
    clientId: 11
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    config:
      universe: ["AAPL"]
    risk:
      maxOrderNotional: 1000
      maxPosition: 10
      maxDailyLoss: 100
      maxOrdersPerSecond: 1

  - name: nvidia
    enabled: true
    image:
      repository: tradeops.azurecr.io/ibkrtrader/strategy-nvidia
      tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
      pullPolicy: IfNotPresent
    clientId: 12
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    config:
      universe: ["NVDA"]
      trade_qty: 1
    risk:
      maxOrderNotional: 5000
      maxPosition: 22
      maxDailyLoss: 10000
      maxOrdersPerSecond: 1


# IBKR Adapter
#
# Adapteren ejer den eneste TWS forbindelse (clientId=1 er reserveret til den).
# Den binder IBKR til NATS:
#   orders.>        (NATS indkommende) til TWS placeOrder()
#   fills/pnl/pos   (TWS callbacks) til NATS udgående
#   risk.adapter.*  heartbeat + disconnection alarmer
# ----------------------------------------------------------------------------
ibkrAdapter:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/ibkr-adapter
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  # clientId=1 er reserveret til adapteren. Brug IKKE 1 i .strategies[].
  clientId: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  reconnectIntervalS: 10
  logLevel: INFO
  logFormat: json      # json | console
  # Kommasepareret liste af tickers at streame realtime markedsdata for.
  # Adapteren kalder IBKR reqMktData for hvert symbol og publicerer ticks til
  # marketdata.realtime.<SYMBOL>. Skal dække alle symboler i et hvilket som helst aktiveret
  # strategi univers; ellers modtager strategien ingen bars.
  universe: "NVDA,AAPL"
  nodeSelector: {}
  tolerations: []

# ----------------------------------------------------------------------------
# Risk plane
# ----------------------------------------------------------------------------
riskGateway:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/risk-gateway
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

  # Konto dækkende pre trade grænser. Håndhæves i tillæg til pr strategi
  # grænser i `.Values.strategies[].risk`.
  global:
    maxAccountDrawdownPct: 0.05
    maxGrossExposure: 1000000
    maxOrdersPerSecond: 50
    restrictedSymbols: []

riskMonitor:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/risk-monitor
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2          # leader elected via Lease
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Drift / breach evaluerings kadence
  reconcileIntervalSeconds: 10
  # Om monitoren får lov til at scalere strategi Deployments til 0.
  # Deaktiver i dev for at undgå utilsigtet kill.
  killSwitchEnabled: true

  # Risikogrænser, sendes til monitoren som env vars.
  # Overstyr i values.paper.yaml / values.live.yaml efter behov.
  thresholds:
    maxDailyLoss: -5000          # halt hvis daglig P&L falder under dette (USD)
    maxDrawdownPct: 0.05        # halt ved 5% intra day drawdown fra HWM
    maxGrossExposure: 1000000   # halt hvis gross eksponering overstiger dette (USD)
    heartbeatTimeoutS: 60       # alarm (ingen halt) hvis adapteren er tavs > 60s

  # Telegram alarmer.
  # CI injicerer token/chatId fra GitHub Actions secrets (TELEGRAM_TOKEN,
  # TELEGRAM_CHAT_ID) og chartet renderer selv en Secret. Hold existingSecret
  # tom for at lade CI-flowet styre det. Sæt existingSecret hvis du selv
  # har oprettet en Secret med nøglerne TELEGRAM_TOKEN, TELEGRAM_CHAT_ID.
  telegram:
    enabled: false
    existingSecret: ""
    token: ""
    chatId: ""

# ----------------------------------------------------------------------------
# API + dashboard
# ----------------------------------------------------------------------------
api:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/api
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

dashboard:
  enabled: true
  image:
    repository: tradeops.azurecr.io/ibkrtrader/dashboard
    tag: "0aeaad4f907ade67761487eb78cd4b092fa56499"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  ingress:
    enabled: false
    className: ""
    host: trader.example.com
    annotations: {}
    tls: []

# ----------------------------------------------------------------------------
# Data plane
# ----------------------------------------------------------------------------

# CloudNativePG: operatoren installeres via chart dependency.
# `timescale.cluster` konfigurerer pr release Cluster CRen.
# Nøglens navn er "cloudnative-pg" fordi dependency aliaset blev fjernet.
cloudnative-pg:
  enabled: false
  crds:
    create: false

timescale:
  cluster:
    enabled: true
    instances: 1                       # bump til 3 for HA
    image:
      # CNPG kompatibelt Postgres image med TimescaleDB extension forindlæst.
      repository: ghcr.io/clevyr/cloudnativepg-timescale
      tag: "17.5-22"
    storage:
      size: 20Gi
      storageClass: ""
    postgresql:
      parameters:
        max_connections: "200"
    bootstrap:
      database: trader
      owner: trader
    # Tilslut S3 backups i v1.
    backup:
      enabled: false

# NATS via subchart. Default config = JetStream aktiveret, file storage.
nats:
  enabled: true
  config:
    cluster:
      enabled: false                   # bump til 3 node cluster for HA
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 10Gi

# JetStream streams deklareret i nats streams.yaml (NACK CRDer, anvendes
# kun hvis NACK controlleren er installeret, deaktiveret som standard).
jetstreamStreams:
  enabled: false
  bootstrapJob:
    enabled: true
    image: natsio/nats-box:0.16.0

# ----------------------------------------------------------------------------
# RBAC
# ----------------------------------------------------------------------------
rbac:
  create: true

serviceAccount:
  create: true
  name: ""                             # genereres fra chart navn hvis tomt
