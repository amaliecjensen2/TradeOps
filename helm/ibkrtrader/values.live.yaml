# Override file for LIVE deployments.
# helm install trader-live ./helm/ibkrtrader \
#   -f values.live.yaml \
#   -f values.live.local.yaml    ← create this locally with real credentials (gitignored)
#
# DO NOT enable both paper and live in the same release without intent.
# Run two separate releases (different namespace) if you need both.
ibkr:
  mode: live
  gateways:
    paper:
      enabled: false
    live:
      enabled: true

riskMonitor:
  killSwitchEnabled: true

  # Telegram: strongly recommended for live trading.
  # Create secret before helm install (see values.paper.yaml for instructions).
  telegram:
    enabled: true
    existingSecret: "telegram-credentials"   # kubectl create secret ...
    token: ""
    chatId: ""

# Tighter limits by default in live.
riskGateway:
  global:
    maxAccountDrawdownPct: 0.02
