# Override fil for LIVE deployments.
# helm install trader live ./helm/ibkrtrader \
#   f values.live.yaml \
#   f values.live.local.yaml    opret denne lokalt med rigtige credentials (gitignored)
#
# AKTIVÉR IKKE både paper og live i samme release uden hensigt.
# Kør to separate releases (forskellig namespace) hvis du har brug for begge.
ibkr:
  mode: live
  gateways:
    paper:
      enabled: false
    live:
      enabled: true

riskMonitor:
  killSwitchEnabled: true

  # Telegram: stærkt anbefalet til live trading.
  # Opret secret før helm install (se values.paper.yaml for instrukser).
  telegram:
    enabled: true
    existingSecret: "telegram-credentials"   # kubectl create secret ...
    token: ""
    chatId: ""

# Strammere grænser som standard i live.
riskGateway:
  global:
    maxAccountDrawdownPct: 0.02
