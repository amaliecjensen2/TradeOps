# Denne fil opretter en Kubernetes Secret, som gemmer NATS Box contexts som JSON-filer.
# Kubernetes API-version for en Secret.
apiVersion: v1
# Ressourcetypen er en Secret.
kind: Secret
# Metadata-blokken indeholder navn, namespace og labels.
metadata:
  # Indsætter namespace-felter fra chartets fælles helper.
  {{- include "nats.metadataNamespace" $ | nindent 2 }}
  # Navnet på secret'en kommer fra values.
  name: {{ .Values.natsBox.contextsSecret.name }}
  # Labels bruges til identifikation og selektion af ressourcen.
  labels:
    # Indsætter de fælles labels for nats-box ressourcer.
    {{- include "natsBox.labels" $ | nindent 4 }}
# Opaque betyder en almindelig vilkårlig Kubernetes Secret.
type: Opaque
# stringData lader Helm skrive tekstværdier, som Kubernetes selv gemmer som secret-data.
stringData:
{{- /* Løber gennem alle definerede NATS Box contexts i values. */}}
{{- range $ctxKey, $ctxVal := .Values.natsBox.contexts }}
  # Opretter en JSON-fil i secret'en pr context-navn.
  "{{ $ctxKey }}.json": |
    # Renderer context-skabelonen, anvender merge/patch-overrides og formatterer resultatet som JSON.
    {{- include "toPrettyRawJson" (include "nats.loadMergePatch" (dict "file" "nats-box/contexts-secret/context.yaml" "merge" (.merge | default dict) "patch" (.patch | default list) "ctx" (merge (dict "contextName" $ctxKey "context" $ctxVal) $)) | fromYaml) | nindent 4 }}
{{- /* Afslutter løkken over contexts. */}}
{{- end }}
