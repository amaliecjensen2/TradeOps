{{- with .Values.config }}

# SERVER_NAME kommer fra pod-navnet, hver NATS-instans får en stabil identitet.
server_name: << $SERVER_NAME >>
#vent 10 sek før du lukker klientforbindelser
lame_duck_grace_period: 10s
#efterfølgende nedlukning foregår i 30 sek 
lame_duck_duration: 30s
#nats skriver sit procesid til denne fil, bruges af andre til at finde nats
pid_file: /var/run/nats/nats.pid

# i values fil gå ind i nats og sæt port
{{- with .nats }}
port: {{ .port }}
{{- end }}

#Hvis monitor er aktiveret, genererer den monitor-porten som https_port når monitor-TLS er slået til, 
#ellers som http_port, så NATS eksponerer sit health/metrics-endpoint 
#med korrekt protokol på den angivne port.
{{- with .monitor }}
{{- if .enabled }}
{{- if .tls.enabled }}
https_port: {{ .port }}
{{- else }}
http_port: {{ .port }}
{{- end }}
{{- end }}
{{- end }}

# hvis jetstream er true inkorperer den
{{- with $.Values.config.jetstream -}}
{{- if .enabled }}
jetstream:
  {{- include "nats.loadMergePatch" (merge (dict "file" "config/jetstream.yaml" "ctx" $) .) | nindent 2 }}
{{- end }}
{{- end }}

{{- end }}
