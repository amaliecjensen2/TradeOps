name: nats
# Byg container image-felterne ud fra chartets image-values.
{{ include "nats.image" (merge (pick $.Values "global") .Values.container.image) }}

ports:
# Opret kun containerporte for de protokoller/features, som er slået til.
{{- range $protocol := list "nats" "leafnodes" "websocket" "mqtt" "cluster" "gateway" "monitor" "profiling" }}
{{- $configProtocol := get $.Values.config $protocol }}
{{- $containerPort := get $.Values.container.ports $protocol }}
{{- if or (eq $protocol "nats") $configProtocol.enabled }}
- {{ merge (dict "name" $protocol "containerPort" $configProtocol.port) $containerPort | toYaml | nindent 2 }}
{{- end }}
{{- end }}

args:
# Start NATS med den rendrerede config-fil fra ConfigMap-mountet.
- --config
- /etc/nats-config/nats.conf

env:
# Kubernetes indsætter pod-navnet, så hver NATS-instans kan få et unikt servernavn.
- name: POD_NAME
  valueFrom:
    fieldRef:
      fieldPath: metadata.name
- name: SERVER_NAME
  value: {{ printf "%s$(POD_NAME)" .Values.config.serverNamePrefix | quote }}
{{- with .Values.container.env }}
{{- include "nats.env" . }}
{{- end }}

lifecycle:
  preStop:
    exec:
      # Bed NATS om at lukke pænt ned, så forbindelser og trafik kan tømmes.
      command:
      - nats-server
      - -sl=ldm=/var/run/nats/nats.pid

{{- with .Values.config.monitor }}
{{- if .enabled }}
# Health probes aktiveres kun, hvis monitor-endpointet er slået til.
startupProbe:
  httpGet:
    path: /healthz
    port: monitor
    {{- if .tls.enabled }}
    scheme: HTTPS
    {{- end}}
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 90
readinessProbe:
  httpGet:
    path: /healthz?js-server-only=true
    port: monitor
    {{- if .tls.enabled }}
    scheme: HTTPS
    {{- end}}
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /healthz?js-enabled-only=true
    port: monitor
    {{- if .tls.enabled }}
    scheme: HTTPS
    {{- end}}
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 30
  successThreshold: 1
  failureThreshold: 3
{{- end }}
{{- end }}

volumeMounts:
# Mount den genererede NATS-konfiguration.
- name: config
  mountPath: /etc/nats-config
# Mount et lille skriveområde til PID-fil og shutdown-signal.
- name: pid
  mountPath: /var/run/nats
# Mount JetStream-disken, hvis filbaseret persistence er aktiveret.
{{- with .Values.config.jetstream }}
{{- if and .enabled .fileStore.enabled .fileStore.pvc.enabled }}
{{- with .fileStore }}
- name: {{ .pvc.name }}
  mountPath: {{ .dir | quote }}
{{- end }}
{{- end }}
{{- end }}
# Mount fælles CA-certifikater, hvis chartet er sat op til det.
{{- include "nats.tlsCAVolumeMount" $ }}
# Mount eventuelle secrets med credentials, certifikater eller nøgler.
{{- range (include "nats.secretNames" $ | fromJson).secretNames }}
- name: {{ .name | quote }}
  mountPath: {{ .dir | quote }}
{{- end }}
