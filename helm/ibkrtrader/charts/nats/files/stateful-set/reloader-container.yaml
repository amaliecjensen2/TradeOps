name: reloader
# Byg image-felterne for reloader-sidecaren ud fra chartets values.
{{ include "nats.image" (merge (pick $.Values "global") .Values.reloader.image) }}

{{- with .Values.reloader.env }}
# Tilføj eventuelle ekstra miljøvariabler til reloaderen.
env:
{{- include "nats.env" . }}
{{- end }}

args:
# Brug PID-filen til at finde NATS-processen, så reloaderen kan sende signaler ved config-ændringer.
- -pid
- /var/run/nats/nats.pid
# Peg på den aktive NATS-konfiguration, som reloaderen skal overvåge.
- -config
- /etc/nats-config/nats.conf
# Indsæt de øvrige reloader-flag fra chartets helper.
{{ include "nats.reloaderConfig" (dict "config" .config "dir" "/etc/nats-config") }}

volumeMounts:
# Mount PID-kataloget, så sidecaren kan læse NATS-processens PID-fil.
- name: pid
  mountPath: /var/run/nats
{{- range $mnt := .natsVolumeMounts }}
{{- $found := false }}
{{- range $.Values.reloader.natsVolumeMountPrefixes }}
{{- if and (not $found) (hasPrefix . $mnt.mountPath) }}
{{- $found = true }}
# Mount kun de NATS-volumes som reloaderen faktisk skal kunne læse fra.
- {{ toYaml $mnt | nindent 2}}
{{- end }}
{{- end }}
{{- end }}
