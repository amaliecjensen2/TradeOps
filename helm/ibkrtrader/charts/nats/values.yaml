# Standardvaerdier for det lokale NATS-subchart.
# Filen er trimmet ned til de sektioner og maps som TradeOps bruger i dag.

global:
  image:
    # Secrets til image pull, hvis NATS-images hentes fra et privat registry.
    pullSecretNames: []
  # Ekstra labels der saettes paa alle NATS-ressourcer.
  labels: {}

tlsCA:
  # Faelles CA-bundle kan mountes i NATS og nats-box, hvis TLS senere slaas til.
  enabled: false
  configMapName:
  secretName:
  dir: /etc/nats-ca-cert

config:
  cluster:
    # Clustering er ikke aktiv i den nuvaerende TradeOps-konfiguration.
    enabled: false
    port: 6222
    replicas: 3
    routeURLs:
      user:
      password:
      useFQDN: false
      k8sClusterDomain: cluster.local
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/cluster
      cert: tls.crt
      key: tls.key

  jetstream:
    # Parent-chartet aktiverer JetStream i sine egne overrides.
    enabled: false
    fileStore:
      enabled: true
      dir: /data
      pvc:
        enabled: true
        size: 10Gi
        storageClassName:
        name:
    memoryStore:
      enabled: false
      maxSize: 1Gi

  nats:
    # Den primaere klientport som resten af platformen bruger.
    port: 4222
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/nats
      cert: tls.crt
      key: tls.key

  leafnodes:
    enabled: false
    port: 7422
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/leafnodes
      cert: tls.crt
      key: tls.key

  websocket:
    enabled: false
    port: 8080
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/websocket
      cert: tls.crt
      key: tls.key

  mqtt:
    enabled: false
    port: 1883
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/mqtt
      cert: tls.crt
      key: tls.key

  gateway:
    enabled: false
    port: 7222
    tls:
      enabled: false
      secretName:
      dir: /etc/nats-certs/gateway
      cert: tls.crt
      key: tls.key

  monitor:
    # Monitor-porten bruges til health checks og metrics.
    enabled: true
    port: 8222
    tls:
      enabled: false

  profiling:
    enabled: false
    port: 65432

  # Tom streng betyder at pod-navnet bruges direkte som servernavn.
  serverNamePrefix: ""
  merge: {}
  patch: []

container:
  image:
    repository: nats
    tag: 2.10.26-alpine
    pullPolicy:
    registry:
    digest:
    fullImageName:

  # Alle protokol-keys beholdes, fordi templates slår op i dem under rendering.
  ports:
    nats: {}
    leafnodes: {}
    websocket: {}
    mqtt: {}
    cluster: {}
    gateway: {}
    monitor: {}
    profiling: {}

  env: {}
  merge: {}
  patch: []

reloader:
  # Sidecaren reagerer paa ConfigMap-aendringer og genindlaeser NATS-konfigurationen.
  enabled: true
  image:
    repository: natsio/nats-server-config-reloader
    tag: 0.16.1
    pullPolicy:
    registry:
    digest:
    fullImageName:
  env: {}
  natsVolumeMountPrefixes:
    - /etc/
  merge: {}
  patch: []

service:
  # Den almindelige Service er aktiv i nuvaerende deployment.
  enabled: true
  ports:
    nats:
      enabled: true
    leafnodes:
      enabled: true
    websocket:
      enabled: true
    mqtt:
      enabled: true
    cluster:
      enabled: false
    gateway:
      enabled: false
    monitor:
      enabled: false
    profiling:
      enabled: false
  merge: {}
  patch: []
  name:

statefulSet:
  merge: {}
  patch: []
  name:

podTemplate:
  # Checksum annotation tvinger rollout, naar ConfigMap-indholdet aendres.
  configChecksumAnnotation: true
  topologySpreadConstraints: {}
  merge: {}
  patch: []

headlessService:
  # Headless service giver stabile DNS-navne til StatefulSet-pods.
  merge: {}
  patch: []
  name:

configMap:
  merge: {}
  patch: []
  name:

podDisruptionBudget:
  enabled: true
  merge: {}
  patch: []
  name:

natsBox:
  # NATS Box bruges til CLI, fejlfinding og stream-bootstrap.
  enabled: true
  contexts:
    default:
      creds:
        contents:
        secretName:
        dir:
        key: nats.creds
      nkey:
        contents:
        secretName:
        dir:
        key: nats.nk
      tls:
        secretName:
        dir:
        cert: tls.crt
        key: tls.key
      merge: {}
      patch: []

  # NATS Box starter i denne context, medmindre parent-chartet overstyrer det.
  defaultContextName: default

  container:
    image:
      repository: natsio/nats-box
      tag: 0.16.0
      pullPolicy:
      registry:
      digest:
      fullImageName:
    env: {}
    merge: {}
    patch: []

  deployment:
    merge: {}
    patch: []
    name:

  podTemplate:
    merge: {}
    patch: []

  contextsSecret:
    merge: {}
    patch: []
    name:

# Listen er tom, så extra-resources-wrapperen renderer intet lige nu.
extraResources: []
