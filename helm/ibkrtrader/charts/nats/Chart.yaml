# Dette er metadata for det indlejrede NATS-subchart.
# Filen bruges af Helm til at identificere chartet, versionen og upstream-oprindelsen.
apiVersion: v2

# Den NATS-applikationsversion chartet er bygget til at deploye.
appVersion: 2.10.26

# Kort upstream-beskrivelse af chartets formaal.
description: A Helm chart for the NATS.io High Speed Cloud Native Distributed Communications
  Technology.

# Upstream-projektets hjemmeside.
home: http://github.com/nats-io/k8s

# Ikon som vises i Helm- og chart-kataloger.
icon: https://nats.io/img/nats-icon-color.png

# søgeord der goer chartet lettere at finde.
keywords:
- nats
- messaging
- cncf

# Upstream-maintainers for det chart vi bygger videre på lokalt.
maintainers:
- email: info@nats.io
  name: The NATS Authors
  url: https://github.com/nats-io

# Chart-navnet som parent-chartet refererer til som dependency.
name: nats

# Selve chart-versionen, som matcher dependency-resolution i parent-chartet.
version: 1.2.11
