{{- if .Values.jetstreamStreams.enabled -}}
{{/*
  Deklarative JetStream stream definitioner via NACK CRDer.
  Kræver at NACK controlleren (https://github.com/nats-io/nack)
  er installeret i clusteret. Slået fra som standard; aktivér i
  values.yaml efter at NACK er installeret.
*/}}
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: orders
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
spec:
  name: ORDERS
  subjects: ["orders.>"]
  retention: limits
  storage: file
  maxAge: 168h         # 7 dage
  replicas: 1
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: fills
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
spec:
  name: FILLS
  subjects: ["fills.>"]
  retention: limits
  storage: file
  maxAge: 0             # for evigt (mirror til S3 i v2)
  replicas: 1
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: marketdata
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
spec:
  name: MARKETDATA
  subjects: ["marketdata.>"]
  retention: limits
  storage: file
  maxAge: 1h
  replicas: 1
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: risk
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
spec:
  name: RISK
  subjects: ["risk.>", "pnl.>", "positions.>"]
  retention: limits
  storage: file
  maxAge: 720h          # 30 dage
  replicas: 1
{{- end }}
