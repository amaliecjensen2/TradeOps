{{- if .Values.riskMonitor.enabled -}}
{{- $name := printf "%s-risk-monitor" (include "ibkrtrader.fullname" .) -}}
{{- $sa := printf "%s-risk-monitor" (include "ibkrtrader.fullname" .) -}}
---
# Dedicated ServiceAccount — the monitor needs RBAC to scale strategy
# Deployments to 0 (the kill switch). Other components don't.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
rules:
  # Scale strategy Deployments to 0 on breach.
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Leader election (the monitor runs replicas=2 with one leader).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read its own ConfigMap so config reload doesn't require a restart.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Emit Events visible in `kubectl describe`.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $sa }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
spec:
  replicas: {{ .Values.riskMonitor.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: risk-monitor
  template:
    metadata:
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: risk-monitor
    spec:
      serviceAccountName: {{ $sa }}
      containers:
        - name: risk-monitor
          image: "{{ .Values.riskMonitor.image.repository }}:{{ .Values.riskMonitor.image.tag }}"
          imagePullPolicy: {{ .Values.riskMonitor.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: KILL_SWITCH_ENABLED
              value: {{ .Values.riskMonitor.killSwitchEnabled | quote }}
            - name: RECONCILE_INTERVAL_S
              value: {{ .Values.riskMonitor.reconcileIntervalSeconds | quote }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: LEASE_NAME
              value: {{ printf "%s-risk-monitor-leader" (include "ibkrtrader.fullname" .) | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MAX_DAILY_LOSS
              value: {{ .Values.riskMonitor.thresholds.maxDailyLoss | quote }}
            - name: MAX_DRAWDOWN_PCT
              value: {{ .Values.riskMonitor.thresholds.maxDrawdownPct | quote }}
            - name: MAX_GROSS_EXPOSURE
              value: {{ .Values.riskMonitor.thresholds.maxGrossExposure | quote }}
            - name: HEARTBEAT_TIMEOUT_S
              value: {{ .Values.riskMonitor.thresholds.heartbeatTimeoutS | quote }}
            - name: TELEGRAM_ENABLED
              value: {{ .Values.riskMonitor.telegram.enabled | quote }}
            {{- if .Values.riskMonitor.telegram.existingSecret }}
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.riskMonitor.telegram.existingSecret }}
                  key: TELEGRAM_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.riskMonitor.telegram.existingSecret }}
                  key: TELEGRAM_CHAT_ID
            {{- else }}
            - name: TELEGRAM_TOKEN
              value: {{ .Values.riskMonitor.telegram.token | quote }}
            - name: TELEGRAM_CHAT_ID
              value: {{ .Values.riskMonitor.telegram.chatId | quote }}
            {{- end }}
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.riskMonitor.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 30
            failureThreshold: 3
{{- end }}
