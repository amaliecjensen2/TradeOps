{{- if .Values.riskMonitor.enabled -}}
{{- $name := printf "%s-risk-monitor" (include "ibkrtrader.fullname" .) -}}
{{- $sa := printf "%s-risk-monitor" (include "ibkrtrader.fullname" .) -}}
{{- $telegramSecret := default (printf "%s-telegram" (include "ibkrtrader.fullname" .)) .Values.riskMonitor.telegram.existingSecret -}}
---
# Dedikeret ServiceAccount, monitoren skal bruge RBAC til at scalere strategi
# Deployments til 0 (kill switchen). Andre komponenter behøver det ikke.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
rules:
  # Scaler strategi Deployments til 0 ved overtrædelse.
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Leader election (monitoren kører replicas=2 med én leder).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Læs sin egen ConfigMap så config reload ikke kræver en genstart.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Udsend Events synlige i `kubectl describe`.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $sa }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
spec:
  replicas: {{ .Values.riskMonitor.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: risk-monitor
  template:
    metadata:
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: risk-monitor
    spec:
      serviceAccountName: {{ $sa }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: risk-monitor
          image: "{{ .Values.riskMonitor.image.repository }}:{{ .Values.riskMonitor.image.tag }}"
          imagePullPolicy: {{ .Values.riskMonitor.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: KILL_SWITCH_ENABLED
              value: {{ .Values.riskMonitor.killSwitchEnabled | quote }}
            - name: RECONCILE_INTERVAL_S
              value: {{ .Values.riskMonitor.reconcileIntervalSeconds | quote }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: LEASE_NAME
              value: {{ printf "%s-risk-monitor-leader" (include "ibkrtrader.fullname" .) | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MAX_DAILY_LOSS
              value: {{ .Values.riskMonitor.thresholds.maxDailyLoss | quote }}
            - name: MAX_DRAWDOWN_PCT
              value: {{ .Values.riskMonitor.thresholds.maxDrawdownPct | quote }}
            - name: MAX_GROSS_EXPOSURE
              value: {{ .Values.riskMonitor.thresholds.maxGrossExposure | quote }}
            - name: HEARTBEAT_TIMEOUT_S
              value: {{ .Values.riskMonitor.thresholds.heartbeatTimeoutS | quote }}
            - name: TELEGRAM_ENABLED
              value: {{ .Values.riskMonitor.telegram.enabled | quote }}
            {{- if .Values.riskMonitor.telegram.enabled }}
            # Altid via secretKeyRef så token/chatId aldrig havner i Deployment-specen.
            # $telegramSecret = existingSecret hvis sat, ellers chart-renderet navn.
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $telegramSecret }}
                  key: TELEGRAM_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $telegramSecret }}
                  key: TELEGRAM_CHAT_ID
            {{- end }}
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.riskMonitor.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 30
            failureThreshold: 3
{{- end }}
