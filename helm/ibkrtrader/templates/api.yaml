{{/*
  Read only API der eksponerer trader state (positions, PnL, adapter heartbeat)
  via HTTP. Dashboarden læser herfra; ingen ordrer placeres via dette endpoint.
  Datakilden er NATS, podden er stateless og kan skaleres frit.
*/}}
{{- if .Values.api.enabled -}}
{{- $name := printf "%s-api" (include "ibkrtrader.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # Antal replicas styres fra values.yaml. Stateless cache => sikkert at skalere.
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "ibkrtrader.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            # commonEnv injicerer IBGW_HOST/PORT, NATS_URL, IBKR_ACCOUNT, IBKR_MODE.
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          # /readyz fortæller om NATS forbindelsen er etableret; /healthz er ren liveness.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
---
# Intern ClusterIP service. Dashboardens server side route læser herfra.
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "ibkrtrader.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
{{- end }}
