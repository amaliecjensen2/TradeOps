{{- if .Values.ibkrAdapter.enabled -}}
{{- $name := printf "%s-ibkr-adapter" (include "ibkrtrader.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
spec:
  # Exactly one replica: the adapter owns a single IBKR clientId and must
  # not have two instances placing orders simultaneously.
  replicas: 1
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ibkr-adapter
  strategy:
    # Recreate avoids a brief overlap where two pods share a clientId,
    # which TWS would reject with error 326.
    type: Recreate
  template:
    metadata:
      annotations:
        # Restart the adapter when shared config changes
        checksum/values: {{ include "ibkrtrader.commonEnv" . | sha256sum }}
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ibkr-adapter
    spec:
      serviceAccountName: {{ include "ibkrtrader.serviceAccountName" . }}
      {{- with .Values.ibkrAdapter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ibkrAdapter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ibkr-adapter
          image: "{{ .Values.ibkrAdapter.image.repository }}:{{ .Values.ibkrAdapter.image.tag }}"
          imagePullPolicy: {{ .Values.ibkrAdapter.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: IBKR_CLIENT_ID
              value: {{ .Values.ibkrAdapter.clientId | quote }}
            - name: HEALTH_PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: {{ .Values.ibkrAdapter.logLevel | default "INFO" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.ibkrAdapter.logFormat | default "json" | quote }}
            - name: RECONNECT_INTERVAL_S
              value: {{ .Values.ibkrAdapter.reconnectIntervalS | default 10 | quote }}
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.ibkrAdapter.resources | nindent 12 }}
          # Give the gateway a generous window to accept the connection
          # before the pod is declared not-ready.
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24       # 2 min total
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
spec:
  type: ClusterIP
  selector:
    {{- include "ibkrtrader.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
  ports:
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
{{- end }}
