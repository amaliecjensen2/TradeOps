{{- if .Values.ibkrAdapter.enabled -}}
{{- $name := printf "%s-ibkr-adapter" (include "ibkrtrader.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
spec:
  # Præcis én replica: adapteren ejer en enkelt IBKR clientId og må
  # ikke have to instanser der placerer ordrer samtidigt.
  replicas: 1
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ibkr-adapter
  strategy:
    # Recreate undgår et kort overlap hvor to pods deler en clientId,
    # hvilket TWS ville afvise med fejl 326.
    type: Recreate
  template:
    metadata:
      annotations:
        # Genstart adapteren når delt config ændres
        checksum/values: {{ include "ibkrtrader.commonEnv" . | sha256sum }}
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ibkr-adapter
    spec:
      serviceAccountName: {{ include "ibkrtrader.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ibkrAdapter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ibkrAdapter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ibkr-adapter
          image: "{{ .Values.ibkrAdapter.image.repository }}:{{ .Values.ibkrAdapter.image.tag }}"
          imagePullPolicy: {{ .Values.ibkrAdapter.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: IBKR_CLIENT_ID
              value: {{ .Values.ibkrAdapter.clientId | quote }}
            - name: HEALTH_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: {{ .Values.ibkrAdapter.logLevel | default "INFO" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.ibkrAdapter.logFormat | default "json" | quote }}
            - name: RECONNECT_INTERVAL_S
              value: {{ .Values.ibkrAdapter.reconnectIntervalS | default 10 | quote }}
            - name: UNIVERSE
              value: {{ .Values.ibkrAdapter.universe | default "" | quote }}
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.ibkrAdapter.resources | nindent 12 }}
          # Giv gatewayen et generøst vindue til at acceptere forbindelsen
          # før podden erklæres ikke klar.
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24       # 2 min i alt
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
spec:
  type: ClusterIP
  selector:
    {{- include "ibkrtrader.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ibkr-adapter
  ports:
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
{{- end }}
