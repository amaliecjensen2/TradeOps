{{/*
  Pre trade risk validator. Strategier POST'er deres ordrer mod denne service
  før de når NATS / TWS. Gatewayen håndhæver både globale konto grænser og
  pr strategi grænser (STRATEGY_LIMITS_JSON bygges nedenfor fra strategies listen).
  Fail closed: hvis readyz fejler returnerer den 503 og strategier stopper.
*/}}
{{- if .Values.riskGateway.enabled -}}
{{- $name := printf "%s-risk-gateway" (include "ibkrtrader.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-gateway
spec:
  replicas: {{ .Values.riskGateway.replicas }}
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: risk-gateway
  template:
    metadata:
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: risk-gateway
      annotations:
        # Tving rolling restart når enten gateway config eller en strategi limit ændres,
        # så STRATEGY_LIMITS_JSON aldrig bliver stale i en kørende pod.
        checksum/config: {{ printf "%s-%s" (toYaml .Values.riskGateway) (toYaml .Values.strategies) | sha256sum }}
    spec:
      serviceAccountName: {{ include "ibkrtrader.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: risk-gateway
          image: "{{ .Values.riskGateway.image.repository }}:{{ .Values.riskGateway.image.tag }}"
          imagePullPolicy: {{ .Values.riskGateway.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.riskGateway.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.riskGateway.port | quote }}
            - name: MAX_ACCOUNT_DRAWDOWN_PCT
              value: {{ .Values.riskGateway.global.maxAccountDrawdownPct | quote }}
            - name: MAX_GROSS_EXPOSURE
              value: {{ .Values.riskGateway.global.maxGrossExposure | quote }}
            - name: MAX_ORDERS_PER_SECOND
              value: {{ .Values.riskGateway.global.maxOrdersPerSecond | quote }}
            - name: RESTRICTED_SYMBOLS
              value: {{ join "," .Values.riskGateway.global.restrictedSymbols | quote }}
            {{- /* Byg per strategi limits JSON fra strategies listen.
                   Resultatet er map: {strategi navn -> risk objekt}, og deserialiseres
                   af gatewayen ved opstart. Kun aktiverede strategier inkluderes. */ -}}
            {{- $limits := dict -}}
            {{- range $s := .Values.strategies -}}
              {{- if $s.enabled -}}
                {{- $_ := set $limits $s.name ($s.risk | default dict) -}}
              {{- end -}}
            {{- end }}
            - name: STRATEGY_LIMITS_JSON
              value: {{ $limits | toJson | quote }}
            {{- include "ibkrtrader.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.riskGateway.resources | nindent 12 }}
          # Fail closed: hvis /readyz rapporterer en uopnåelig state DB
          # stopper podden med at acceptere trafik, strategier ser 503 og standser.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
---
# ClusterIP service som strategierne POST'er ordrer mod (RISK_GATEWAY_URL env varen).
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-gateway
spec:
  type: ClusterIP
  selector:
    {{- include "ibkrtrader.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: risk-gateway
  ports:
    - name: http
      port: {{ .Values.riskGateway.port }}
      targetPort: http
      protocol: TCP
{{- end }}
