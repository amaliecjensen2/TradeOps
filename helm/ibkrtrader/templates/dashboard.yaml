{{- if .Values.dashboard.enabled -}}
{{- $name := printf "%s-dashboard" (include "ibkrtrader.fullname" .) -}}
{{- /* Beregn intern URL til API service én gang, så samme værdi bruges både server og klient side. */ -}}
{{- $apiUrl := printf "http://%s-api.%s.svc.cluster.local:%v" (include "ibkrtrader.fullname" .) .Release.Namespace .Values.api.port -}}
---
# Next.js dashboard. Proxyer alle /api/trader/* kald videre til intern API service
# ved hjælp af API_URL env varen (server side) og viser samme værdi som
# NEXT_PUBLIC_API_URL til klient bundlen.
# Ingress er som default slået fra, brug port forward eller LB efter behov.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "ibkrtrader.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "ibkrtrader.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "ibkrtrader.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.dashboard.port | quote }}
            # Next.js standalone serveren binder kun til loopback hvis HOSTNAME ikke sættes.
            - name: HOSTNAME
              value: "0.0.0.0"
            # NEXT_PUBLIC_* eksponeres til klient bundlen; API_URL er kun server side.
            - name: NEXT_PUBLIC_API_URL
              value: {{ $apiUrl | quote }}
            - name: API_URL
              value: {{ $apiUrl | quote }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    {{- include "ibkrtrader.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
{{- if .Values.dashboard.ingress.enabled }}
---
# Valgfri Ingress, kun renderet når dashboard.ingress.enabled=true.
# Bruges når dashboarden skal eksponeres ud af clusteret uden port forward.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  {{- with .Values.dashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.className }}
  ingressClassName: {{ .Values.dashboard.ingress.className }}
  {{- end }}
  rules:
    - {{- if .Values.dashboard.ingress.host }}
      host: {{ .Values.dashboard.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
  {{- with .Values.dashboard.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
