{{- if .Values.serviceAccount.create -}}
# Fælles ServiceAccount som de fleste pods kører under (api, dashboard, ibkr-adapter,
# ibgateway, strategier). risk-monitor bruger en separat dedikeret SA fordi den
# har brug for ekstra RBAC til at scalere strategi Deployments.
# Sæt serviceAccount.create=false hvis SA leveres udefra (fx GitOps).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ibkrtrader.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
{{- end }}
