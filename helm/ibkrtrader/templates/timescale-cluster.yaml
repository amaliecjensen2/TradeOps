{{- if .Values.timescale.cluster.enabled -}}
{{- $name := printf "%s-timescale" (include "ibkrtrader.fullname" .) -}}
{{/*
  Kræver CloudNativePG operatoren (installeret via chart dependency).
  Vi bruger et CNPG kompatibelt Postgres image med TimescaleDB forindlæst,
  upstream CNPG imaget bundler IKKE Timescale og Timescale
  Docker imaget er inkompatibelt med CNPG operatoren (forskellig uid,
  forskellig distro). Clevyr imaget bygger bro over det.
*/}}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: timescale
spec:
  instances: {{ .Values.timescale.cluster.instances }}
  imageName: "{{ .Values.timescale.cluster.image.repository }}:{{ .Values.timescale.cluster.image.tag }}"
  postgresql:
    parameters:
      {{- toYaml .Values.timescale.cluster.postgresql.parameters | nindent 6 }}
  bootstrap:
    initdb:
      database: {{ .Values.timescale.cluster.bootstrap.database | quote }}
      owner: {{ .Values.timescale.cluster.bootstrap.owner | quote }}
  storage:
    size: {{ .Values.timescale.cluster.storage.size | quote }}
    {{- if or .Values.timescale.cluster.storage.storageClass .Values.global.storageClass }}
    storageClass: {{ default .Values.global.storageClass .Values.timescale.cluster.storage.storageClass | quote }}
    {{- end }}
  monitoring:
    enablePodMonitor: false
{{- end }}
