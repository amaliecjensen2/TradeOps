{{- if and .Values.riskMonitor.telegram.enabled (not .Values.riskMonitor.telegram.existingSecret) -}}
{{- if and .Values.riskMonitor.telegram.token .Values.riskMonitor.telegram.chatId -}}
---
# Telegram credentials Secret.
# Only rendered when telegram.enabled=true AND no existingSecret is set
# AND inline token/chatId are provided (local dev only).
#
# In production, create the secret manually BEFORE helm install:
#   kubectl create secret generic telegram-credentials \
#     --from-literal=TELEGRAM_TOKEN=<bot-token> \
#     --from-literal=TELEGRAM_CHAT_ID=<chat-id>
# Then set riskMonitor.telegram.existingSecret=telegram-credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ibkrtrader.fullname" . }}-telegram
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
type: Opaque
stringData:
  TELEGRAM_TOKEN: {{ .Values.riskMonitor.telegram.token | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.riskMonitor.telegram.chatId | quote }}
{{- end }}
{{- end }}
