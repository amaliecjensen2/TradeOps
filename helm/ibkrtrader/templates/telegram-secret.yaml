{{- if and .Values.riskMonitor.telegram.enabled (not .Values.riskMonitor.telegram.existingSecret) -}}
---
# Telegram credentials Secret.
# Renderes når telegram.enabled=true OG ingen existingSecret er sat. CI
# injicerer token/chatId fra GitHub Actions secrets via tmp values fil.
# Fallback "REPLACE_ME" gør at deployment fejler hurtigt og synligt hvis
# values ikke er sat korrekt.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ibkrtrader.fullname" . }}-telegram
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-monitor
type: Opaque
stringData:
  TELEGRAM_TOKEN: {{ .Values.riskMonitor.telegram.token | default "REPLACE_ME" | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.riskMonitor.telegram.chatId | default "REPLACE_ME" | quote }}
{{- end }}
