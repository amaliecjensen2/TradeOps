{{/*
  IBKR Gateway login credentials.
  Renderes kun når:
    - der ikke allerede peges på en pre eksisterende Secret (existingSecret er tom), OG
    - mindst én af gateways (paper eller live) er aktiveret.
  CI workflowet injicerer username/password via en tmp values fil; "REPLACE_ME"
  er en bevidst fail fast værdi så IBKR login fejler tydeligt ved manglende setup.
*/}}
{{- if not .Values.ibkr.credentials.existingSecret }}
{{- if or .Values.ibkr.gateways.paper.enabled .Values.ibkr.gateways.live.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ibkrtrader.fullname" . }}-ibkr
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ibkrtrader.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Nøglenavnene matcher det gnzsnz/ib-gateway image forventer som env vars.
  TWS_USERID: {{ .Values.ibkr.credentials.username | default "REPLACE_ME" | quote }}
  TWS_PASSWORD: {{ .Values.ibkr.credentials.password | default "REPLACE_ME" | quote }}
{{- end }}
{{- end }}
