# Azure AKS override values.
# Brug med: f helm/ibkrtrader/values.azure.yaml

global:
  # AKS kan hente fra ACR når clusteret er attached til registry.
  imagePullSecrets: []

# Aktivér ingress kun når du har en ingress controller + DNS klar.
dashboard:
  ingress:
    enabled: true
    className: "nginx"
    host: ""
    annotations: {}
    tls: []
