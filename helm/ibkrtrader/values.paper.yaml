# Override fil for paper trading deployments.
# helm install trader paper ./helm/ibkrtrader \
#   f values.paper.yaml \
#   f values.paper.local.yaml    opret denne lokalt med rigtige credentials (gitignored)
ibkr:
  mode: paper
  gateways:
    paper:
      enabled: true
    live:
      enabled: false

riskMonitor:
  killSwitchEnabled: false

  # Telegram: slået fra som standard i paper.
  # CI tænder automatisk for det hvis TELEGRAM_TOKEN/TELEGRAM_CHAT_ID GitHub
  # secrets er sat (se .github/workflows/deploy-aks.yml). Til lokal dev kan
  # du sætte enabled=true + token + chatId direkte her (commit ikke værdierne).
  telegram:
    enabled: false
