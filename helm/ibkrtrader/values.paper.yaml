# Override fil for paper trading deployments.
# helm install trader paper ./helm/ibkrtrader \
#   f values.paper.yaml \
#   f values.paper.local.yaml    opret denne lokalt med rigtige credentials (gitignored)
ibkr:
  mode: paper
  gateways:
    paper:
      enabled: true
    live:
      enabled: false

riskMonitor:
  killSwitchEnabled: false   # sikrere standard i paper, aktivér når testet

  # Telegram: slået fra som standard i paper.
  # For at aktivere, enten:
  #   Mulighed A (produktion):
  #     kubectl create secret generic telegram-credentials \
  #       --from-literal=TELEGRAM_TOKEN=<token> \
  #       --from-literal=TELEGRAM_CHAT_ID=<chat id>
  #     sæt derefter existingSecret: telegram-credentials
  #
  #   Mulighed B (hurtig dev test):
  #     Sæt token + chatId direkte her (commit aldrig rigtige værdier).
  telegram:
    enabled: false
    existingSecret: ""
    token: ""
    chatId: ""
