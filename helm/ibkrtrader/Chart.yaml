apiVersion: v2
name: ibkrtrader
description: |
  Multi-strategy trading platform on a single IBKR account.
  Bundles IBKR Gateway, N strategy pods, an in-path risk gateway,
  an out-of-band risk monitor, NATS JetStream, and a Next.js +
  FastAPI dashboard.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0"
keywords:
  - trading
  - ibkr
  - interactive-brokers
  - quant
home: https://github.com/amaliejensen2/ibkrtrader
sources:
  - https://github.com/amaliejensen2/ibkrtrader
maintainers:
  - name: amaliejensen2
    email: amalienovember@gmail.com
dependencies:
  - name: nats
    version: "1.2.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
